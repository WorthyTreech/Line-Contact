<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorthyTree LINE追加</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; background-color: #f5f7fa; padding: 40px 15px; margin: 0; }
        .card { background: white; max-width: 400px; margin: 0 auto; padding: 30px 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { color: #333; font-size: 22px; margin-bottom: 5px; }
        .sub-title { color: #666; font-size: 14px; margin-top: 0; margin-bottom: 25px; }
        .qr-img { width: 180px; height: 180px; object-fit: contain; margin: 10px auto; display: block; border: 1px solid #eee; padding: 5px; border-radius: 10px; }
        .line-btn-container { margin: 25px auto; display: block; }
        .line-btn-container img { height: 44px; border: 0; transition: transform 0.2s; }
        .line-btn-container img:hover { transform: scale(1.05); }
        .notice { font-size: 12px; color: #ff4757; font-weight: bold; line-height: 1.5; background: #fff1f2; padding: 10px; border-radius: 10px; margin: 20px 0; }
        .divider { height: 1px; background-color: #eee; margin: 30px 0; }
        .yt-section { background-color: #fafafa; padding: 15px; border-radius: 15px; }
        .yt-title { font-size: 14px; font-weight: bold; color: #555; margin-bottom: 10px; }
        .yt-btn { display: inline-flex; align-items: center; justify-content: center; background-color: #FF0000; color: white; text-decoration: none; padding: 10px 20px; border-radius: 25px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <!-- 1. タイトル表示 -->
    <h1>WorthyTree LINE友達追加</h1>
    <p class="sub-title">WorthyのLine友達追加ページです！</p>
    
    <!-- 2. QRコード画像を表示（qr.png） -->
    <img src="https://qr-official.line.me/gs/M_084cqtba_GW.png?oat_content=qr">
    
    <!-- 3. LINE公式友だち追加ボタン -->
    <a href="https://lin.ee/ojHWQoq" class="line-btn-container">
        <img src="https://scdn.line-apps.com/n/line_add_friends/btn/ja.png" alt="友だち追加">
    </a>
    
    <!-- 注意書き -->
    <p class="notice">※ビジネスアカウントのため登録したら、画面に反映されるように<br>最初にスタンプかメッセージを1通送ってください</p>
    
    <div class="divider"></div>
    
    <!-- 4. YouTubeリンクの表示 -->
    <div class="yt-section">
        <div class="yt-title">WorthyTreeのYouTubeチャンネル</div>
        <a href="https://youtube.com/@worthytreech" class="yt-btn">チャンネルを見に行く</a>
    </div>
</div>

</body>
</html>
